<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nice Cam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      height: 100vh;
      display: grid;
      gap: 2px;
    }
    iframe { width: 100%; height: 100%; border: none; }
    .status {
      color: #555;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .status.error { color: #a33; }
  </style>
</head>
<body>
  <div class="status" id="status">Lade Webcams…</div>
  <script>
    const WORKER_URL = "https://paco.team/api/webcams";

    function toEmbedUrl(url) {
      const match = url.match(/youtube\.com\/watch\?v=([^&]+)/);
      if (match) return `https://www.youtube.com/embed/${match[1]}?autoplay=1&mute=1`;
      if (url.includes("youtube.com/embed/") && !url.includes("autoplay")) {
        return `${url}${url.includes("?") ? "&" : "?"}autoplay=1&mute=1`;
      }
      return url;
    }

    function gridDimensions(count) {
      const cols = Math.ceil(Math.sqrt(count));
      const rows = Math.ceil(count / cols);
      return { cols, rows };
    }

    async function loadWebcams() {
      try {
        const res = await fetch(WORKER_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const all = await res.json();
        const webcams = all.filter((c) => c.rotation);

        if (!webcams.length) {
          document.getElementById("status").textContent = "Keine Webcams aktiv.";
          return;
        }

        const { cols, rows } = gridDimensions(webcams.length);
        document.body.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        document.body.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        document.getElementById("status").remove();

        webcams.forEach((cam) => {
          const iframe = document.createElement("iframe");
          iframe.src = toEmbedUrl(cam.url);
          iframe.allow = "autoplay; encrypted-media";
          iframe.allowFullscreen = true;
          iframe.title = cam.name;
          document.body.appendChild(iframe);
        });
      } catch (err) {
        const el = document.getElementById("status");
        el.className = "status error";
        el.textContent = `Fehler: ${err.message}`;
      }
    }

    loadWebcams();
  </script>
</body>
</html>
