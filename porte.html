<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Commande d'ouverture du portail" />
    <meta name="theme-color" content="#667eea" />

    <title>Portail</title>

    <style>
      /* CSS Custom Properties für Themes */
      :root {
        --bg-gradient-1: #667eea;
        --bg-gradient-2: #764ba2;
        --btn-gradient-1: #ff6b35;
        --btn-gradient-2: #f7931e;
        --btn-hover-1: #ff7b45;
        --btn-hover-2: #ffa32e;
        --btn-shadow: rgba(255, 107, 53, 0.4);
        --text-primary: rgba(255, 255, 255, 0.95);
        --text-secondary: rgba(255, 255, 255, 0.7);
        --status-bg: rgba(255, 255, 255, 0.15);
        --card-bg: rgba(255, 255, 255, 0.1);
        --offline-bg: rgba(244, 67, 54, 0.9);
        --success-bg: rgba(76, 175, 80, 0.9);
        --error-bg: rgba(244, 67, 54, 0.9);
        /* Animated background colors */
        --blob-1: rgba(102, 126, 234, 0.6);
        --blob-2: rgba(118, 75, 162, 0.5);
        --blob-3: rgba(255, 107, 53, 0.4);
        --blob-4: rgba(247, 147, 30, 0.3);
      }

      [data-theme="dark"] {
        --bg-gradient-1: #0f0f1a;
        --bg-gradient-2: #1a1a2e;
        --btn-gradient-1: #ff6b35;
        --btn-gradient-2: #f7931e;
        --btn-hover-1: #ff7b45;
        --btn-hover-2: #ffa32e;
        --btn-shadow: rgba(255, 107, 53, 0.3);
        --text-primary: rgba(255, 255, 255, 0.95);
        --text-secondary: rgba(255, 255, 255, 0.6);
        --status-bg: rgba(255, 255, 255, 0.1);
        --card-bg: rgba(255, 255, 255, 0.05);
        /* Dark mode blob colors - more subtle */
        --blob-1: rgba(102, 126, 234, 0.2);
        --blob-2: rgba(118, 75, 162, 0.15);
        --blob-3: rgba(255, 107, 53, 0.15);
        --blob-4: rgba(147, 51, 234, 0.1);
      }

      /* Reset und Basis-Styles */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        overflow: hidden;
      }

      body {
        background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
        transition: background 0.5s ease;
        position: relative;
      }

      /* ==================== ANIMATED BACKGROUND ==================== */
      .animated-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
      }

      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.8;
        animation: float 20s ease-in-out infinite;
        transition: background 0.5s ease, opacity 0.5s ease;
      }

      .blob-1 {
        width: 400px;
        height: 400px;
        background: var(--blob-1);
        top: -100px;
        left: -100px;
        animation-delay: 0s;
        animation-duration: 25s;
      }

      .blob-2 {
        width: 350px;
        height: 350px;
        background: var(--blob-2);
        top: 50%;
        right: -100px;
        animation-delay: -5s;
        animation-duration: 20s;
      }

      .blob-3 {
        width: 300px;
        height: 300px;
        background: var(--blob-3);
        bottom: -50px;
        left: 30%;
        animation-delay: -10s;
        animation-duration: 22s;
      }

      .blob-4 {
        width: 250px;
        height: 250px;
        background: var(--blob-4);
        top: 30%;
        left: 10%;
        animation-delay: -15s;
        animation-duration: 28s;
      }

      .blob-5 {
        width: 200px;
        height: 200px;
        background: var(--blob-2);
        bottom: 20%;
        right: 20%;
        animation-delay: -8s;
        animation-duration: 24s;
      }

      @keyframes float {
        0%, 100% {
          transform: translate(0, 0) scale(1) rotate(0deg);
        }
        25% {
          transform: translate(50px, -50px) scale(1.1) rotate(5deg);
        }
        50% {
          transform: translate(-30px, 30px) scale(0.95) rotate(-5deg);
        }
        75% {
          transform: translate(40px, 20px) scale(1.05) rotate(3deg);
        }
      }

      /* Subtile Partikel */
      .particles {
        position: absolute;
        width: 100%;
        height: 100%;
      }

      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        animation: drift 15s ease-in-out infinite;
      }

      [data-theme="dark"] .particle {
        background: rgba(255, 255, 255, 0.15);
      }

      @keyframes drift {
        0%, 100% {
          transform: translateY(0) translateX(0);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(-100vh) translateX(50px);
          opacity: 0;
        }
      }

      /* Container */
      .container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 100%;
        padding: 1.5rem;
        gap: 1.5rem;
      }

      /* Header mit Uhrzeit und Wetter */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: 400px;
        padding: 1rem 1.25rem;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 16px;
        color: var(--text-primary);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .time-display {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .time {
        font-size: 2rem;
        font-weight: 600;
        letter-spacing: -0.5px;
      }

      .date {
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      .weather {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-align: right;
      }

      .weather-icon {
        font-size: 2.5rem;
        line-height: 1;
      }

      .weather-info {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }

      .weather-temp {
        font-size: 1.4rem;
        font-weight: 600;
      }

      .weather-desc {
        font-size: 0.75rem;
        color: var(--text-secondary);
        text-transform: capitalize;
      }

      .weather-location {
        font-size: 0.7rem;
        color: var(--text-secondary);
        opacity: 0.8;
      }

      /* Theme Toggle */
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 10;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        width: 48px;
        height: 48px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-primary);
        font-size: 1.4rem;
        transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
      }

      .theme-toggle:hover {
        transform: scale(1.1) rotate(15deg);
        background: var(--status-bg);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      }

      .theme-toggle:active {
        transform: scale(0.95);
      }

      /* Offline Banner */
      .offline-banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: var(--offline-bg);
        color: white;
        padding: 0.75rem 1rem;
        text-align: center;
        font-weight: 500;
        font-size: 0.9rem;
        transform: translateY(-100%);
        transition: transform 0.3s ease;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .offline-banner.visible {
        transform: translateY(0);
      }

      .offline-banner svg {
        width: 20px;
        height: 20px;
      }

      /* Titel */
      .title {
        color: var(--text-secondary);
        font-size: 0.9rem;
        font-weight: 500;
        letter-spacing: 1px;
        margin: 0;
        text-transform: uppercase;
      }

      /* Hauptbutton */
      #trigger {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        font-size: 1.4rem;
        font-weight: 600;
        padding: 1.5rem 3rem;
        border: none;
        border-radius: 20px;
        background: linear-gradient(145deg, var(--btn-gradient-1), var(--btn-gradient-2));
        color: #ffffff;
        cursor: pointer;
        box-shadow:
          0 8px 32px var(--btn-shadow),
          0 2px 8px rgba(0, 0, 0, 0.1);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        min-width: 280px;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        overflow: hidden;
      }

      /* Tor-Icon */
      .gate-icon {
        width: 32px;
        height: 32px;
        transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .gate-left, .gate-right {
        transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: center;
      }

      /* Animation wenn Tor öffnet */
      #trigger.opening .gate-left {
        transform: rotate(-35deg) translateX(-3px);
      }

      #trigger.opening .gate-right {
        transform: rotate(35deg) translateX(3px);
      }

      #trigger.success .gate-icon {
        animation: pulse 0.5s ease;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.2); }
      }

      /* Erfolgs-Welle */
      .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        transform: scale(0);
        pointer-events: none;
      }

      .ripple.animate {
        animation: ripple-effect 0.8s ease-out forwards;
      }

      @keyframes ripple-effect {
        to {
          transform: scale(4);
          opacity: 0;
        }
      }

      /* Hover-Effekt */
      #trigger:hover:not(:disabled) {
        background: linear-gradient(145deg, var(--btn-hover-1), var(--btn-hover-2));
        box-shadow:
          0 12px 40px var(--btn-shadow),
          0 4px 12px rgba(0, 0, 0, 0.15);
        transform: translateY(-3px);
      }

      /* Fokus-Effekt */
      #trigger:focus {
        outline: none;
        box-shadow:
          0 8px 32px var(--btn-shadow),
          0 0 0 4px rgba(255, 255, 255, 0.4);
      }

      #trigger:focus:not(:focus-visible) {
        box-shadow:
          0 8px 32px var(--btn-shadow),
          0 2px 8px rgba(0, 0, 0, 0.1);
      }

      #trigger:focus-visible {
        box-shadow:
          0 8px 32px var(--btn-shadow),
          0 0 0 4px rgba(255, 255, 255, 0.4);
      }

      /* Klick-Effekt */
      #trigger:active:not(:disabled) {
        transform: scale(0.97);
      }

      /* Deaktivierter Zustand */
      #trigger:disabled {
        cursor: not-allowed;
        opacity: 0.85;
      }

      /* Spinner */
      .spinner {
        display: none;
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      #trigger.loading .spinner {
        display: block;
      }

      #trigger.loading .gate-icon {
        display: none;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Status-Nachricht */
      .status {
        padding: 1rem 1.5rem;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 500;
        text-align: center;
        opacity: 0;
        transform: translateY(-10px) scale(0.95);
        transition: all 0.3s ease;
        max-width: 320px;
        color: white;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .status.visible {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .status.success {
        background: var(--success-bg);
        box-shadow: 0 4px 16px rgba(76, 175, 80, 0.4);
      }

      .status.error {
        background: var(--error-bg);
        box-shadow: 0 4px 16px rgba(244, 67, 54, 0.4);
      }

      /* Konfetti Container */
      .confetti-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 999;
        overflow: hidden;
      }

      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        opacity: 0;
      }

      .confetti.animate {
        animation: confetti-fall 3s ease-out forwards;
      }

      @keyframes confetti-fall {
        0% {
          opacity: 1;
          transform: translateY(0) rotate(0deg);
        }
        100% {
          opacity: 0;
          transform: translateY(100vh) rotate(720deg);
        }
      }

      /* Responsive Anpassungen für Blobs */
      @media (max-width: 768px) {
        .blob-1 { width: 250px; height: 250px; }
        .blob-2 { width: 200px; height: 200px; }
        .blob-3 { width: 180px; height: 180px; }
        .blob-4 { width: 150px; height: 150px; }
        .blob-5 { width: 120px; height: 120px; }
      }
    </style>
  </head>
  <body>
    <!-- Animated Background -->
    <div class="animated-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
      <div class="blob blob-5"></div>
      <div class="particles" id="particles"></div>
    </div>

    <!-- Offline Banner -->
    <div class="offline-banner" role="alert" aria-live="assertive">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
      Hors ligne - Vérifiez votre connexion
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Changer le thème">
      <span class="theme-icon">🌙</span>
    </button>

    <!-- Confetti Container -->
    <div class="confetti-container" id="confetti-container"></div>

    <div class="container">
      <!-- Header mit Zeit und Wetter -->
      <div class="header">
        <div class="time-display">
          <div class="time" id="time">--:--</div>
          <div class="date" id="date">---</div>
        </div>
        <div class="weather">
          <div class="weather-info">
            <div class="weather-temp" id="weather-temp">--°</div>
            <div class="weather-desc" id="weather-desc">---</div>
            <div class="weather-location">Nice, FR</div>
          </div>
          <div class="weather-icon" id="weather-icon">☀️</div>
        </div>
      </div>

      <p class="title">Commande du portail</p>

      <button
        id="trigger"
        aria-label="Ouvrir le portail"
        role="button"
      >
        <!-- Animiertes Tor-Icon -->
        <svg class="gate-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 21h18"/>
          <path d="M5 21V7l7-4 7 4v14"/>
          <path class="gate-left" d="M9 21v-8h1v8"/>
          <path class="gate-right" d="M14 21v-8h1v8"/>
          <path d="M9 9h1"/>
          <path d="M14 9h1"/>
        </svg>
        <span class="spinner" aria-hidden="true"></span>
        <span class="btn-text">Ouvrir le portail</span>
      </button>

      <div class="status" role="status" aria-live="polite"></div>
    </div>

    <script>
      (function() {
        'use strict';

        // DOM-Elemente
        const trigger = document.getElementById('trigger');
        const status = document.querySelector('.status');
        const offlineBanner = document.querySelector('.offline-banner');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('.theme-icon');
        const timeEl = document.getElementById('time');
        const dateEl = document.getElementById('date');
        const weatherTemp = document.getElementById('weather-temp');
        const weatherDesc = document.getElementById('weather-desc');
        const weatherIcon = document.getElementById('weather-icon');
        const confettiContainer = document.getElementById('confetti-container');
        const particlesContainer = document.getElementById('particles');

        // Webhook URL
        const WEBHOOK_URL = 'https://home.paco.team/api/webhook/open-porte-116-iPh8HYyBLH4_2K-W9j_bIE5s';

        // Nizza Koordinaten für Wetter
        const NICE_LAT = 43.7102;
        const NICE_LON = 7.2620;

        // ==================== PARTICLES ====================
        function createParticles() {
          const particleCount = 20;

          for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = (100 + Math.random() * 20) + '%';
            particle.style.animationDelay = (Math.random() * 15) + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particle.style.width = (2 + Math.random() * 4) + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
          }
        }

        // ==================== THEME ====================
        function initTheme() {
          const savedTheme = localStorage.getItem('theme');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

          if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeIcon.textContent = '☀️';
          } else {
            themeIcon.textContent = '🌙';
          }
        }

        function toggleTheme() {
          const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

          if (isDark) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            themeIcon.textContent = '🌙';
          } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            themeIcon.textContent = '☀️';
          }
        }

        // ==================== ZEIT ====================
        function updateTime() {
          const now = new Date();

          const hours = now.getHours().toString().padStart(2, '0');
          const minutes = now.getMinutes().toString().padStart(2, '0');
          timeEl.textContent = `${hours}:${minutes}`;

          const options = { weekday: 'long', day: 'numeric', month: 'long' };
          const dateStr = now.toLocaleDateString('fr-FR', options);
          dateEl.textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        }

        // ==================== WETTER ====================
        async function fetchWeather() {
          try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${NICE_LAT}&longitude=${NICE_LON}&current=temperature_2m,weather_code&timezone=Europe/Paris`;

            const response = await fetch(url);
            if (!response.ok) throw new Error('Weather fetch failed');

            const data = await response.json();
            const temp = Math.round(data.current.temperature_2m);
            const code = data.current.weather_code;

            weatherTemp.textContent = `${temp}°C`;

            const weatherInfo = getWeatherInfo(code);
            weatherDesc.textContent = weatherInfo.desc;
            weatherIcon.textContent = weatherInfo.icon;

          } catch (error) {
            console.error('Weather error:', error);
            weatherTemp.textContent = '--°';
            weatherDesc.textContent = 'Indisponible';
          }
        }

        function getWeatherInfo(code) {
          const weatherMap = {
            0: { desc: 'Ensoleillé', icon: '☀️' },
            1: { desc: 'Peu nuageux', icon: '🌤️' },
            2: { desc: 'Partiellement nuageux', icon: '⛅' },
            3: { desc: 'Nuageux', icon: '☁️' },
            45: { desc: 'Brouillard', icon: '🌫️' },
            48: { desc: 'Brouillard givrant', icon: '🌫️' },
            51: { desc: 'Bruine légère', icon: '🌧️' },
            53: { desc: 'Bruine', icon: '🌧️' },
            55: { desc: 'Bruine dense', icon: '🌧️' },
            61: { desc: 'Pluie légère', icon: '🌦️' },
            63: { desc: 'Pluie', icon: '🌧️' },
            65: { desc: 'Pluie forte', icon: '🌧️' },
            71: { desc: 'Neige légère', icon: '🌨️' },
            73: { desc: 'Neige', icon: '❄️' },
            75: { desc: 'Neige forte', icon: '❄️' },
            80: { desc: 'Averses', icon: '🌦️' },
            81: { desc: 'Averses modérées', icon: '🌧️' },
            82: { desc: 'Averses fortes', icon: '🌧️' },
            95: { desc: 'Orage', icon: '⛈️' },
            96: { desc: 'Orage avec grêle', icon: '⛈️' },
            99: { desc: 'Orage violent', icon: '⛈️' }
          };

          return weatherMap[code] || { desc: 'Inconnu', icon: '🌡️' };
        }

        // ==================== OFFLINE ERKENNUNG ====================
        function updateOnlineStatus() {
          if (navigator.onLine) {
            offlineBanner.classList.remove('visible');
            trigger.disabled = false;
          } else {
            offlineBanner.classList.add('visible');
            trigger.disabled = true;
          }
        }

        // ==================== KONFETTI ====================
        function createConfetti() {
          const colors = ['#ff6b35', '#f7931e', '#667eea', '#764ba2', '#4caf50', '#fff'];

          for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = '-10px';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            confetti.style.animationDelay = Math.random() * 0.5 + 's';
            confetti.style.animationDuration = (2 + Math.random() * 2) + 's';

            confettiContainer.appendChild(confetti);

            requestAnimationFrame(() => confetti.classList.add('animate'));

            setTimeout(() => confetti.remove(), 4000);
          }
        }

        // ==================== RIPPLE EFFEKT ====================
        function createRipple(event) {
          const button = event.currentTarget;
          const ripple = document.createElement('span');
          ripple.className = 'ripple';

          const rect = button.getBoundingClientRect();
          const size = Math.max(rect.width, rect.height);

          ripple.style.width = ripple.style.height = size + 'px';
          ripple.style.left = (event.clientX - rect.left - size / 2) + 'px';
          ripple.style.top = (event.clientY - rect.top - size / 2) + 'px';

          button.appendChild(ripple);

          requestAnimationFrame(() => ripple.classList.add('animate'));

          setTimeout(() => ripple.remove(), 800);
        }

        // ==================== STATUS ====================
        function showStatus(message, type) {
          status.textContent = message;
          status.className = 'status visible ' + type;

          setTimeout(() => {
            status.classList.remove('visible');
          }, 4000);
        }

        // ==================== PORTAIL ÖFFNEN ====================
        async function openPortail(event) {
          if (!navigator.onLine) {
            showStatus('Pas de connexion internet', 'error');
            return;
          }

          createRipple(event);

          trigger.classList.add('loading');
          trigger.disabled = true;
          trigger.setAttribute('aria-busy', 'true');

          trigger.classList.add('opening');

          try {
            const response = await fetch(WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' }
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            trigger.classList.remove('opening');
            trigger.classList.add('success');

            showStatus('Le portail s\'ouvre !', 'success');
            createConfetti();

            if (navigator.vibrate) {
              navigator.vibrate([100, 50, 100]);
            }

            setTimeout(() => trigger.classList.remove('success'), 1000);

          } catch (error) {
            console.error('Erreur:', error);
            trigger.classList.remove('opening');
            showStatus('Erreur de connexion. Réessayez.', 'error');

            if (navigator.vibrate) {
              navigator.vibrate(300);
            }
          } finally {
            trigger.classList.remove('loading');
            trigger.disabled = false;
            trigger.setAttribute('aria-busy', 'false');
          }
        }

        // ==================== INIT ====================
        function init() {
          // Particles erstellen
          createParticles();

          // Theme initialisieren
          initTheme();

          // Zeit starten
          updateTime();
          setInterval(updateTime, 1000);

          // Wetter laden
          fetchWeather();
          setInterval(fetchWeather, 10 * 60 * 1000);

          // Online-Status
          updateOnlineStatus();
          window.addEventListener('online', updateOnlineStatus);
          window.addEventListener('offline', updateOnlineStatus);

          // Event-Listener
          trigger.addEventListener('click', openPortail);
          themeToggle.addEventListener('click', toggleTheme);

          // System Theme Change
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
              if (e.matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '☀️';
              } else {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.textContent = '🌙';
              }
            }
          });
        }

        // Start
        init();
      })();
    </script>
  </body>
</html>
