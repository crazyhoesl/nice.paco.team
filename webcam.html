<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webcam Rotation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    iframe { width: 100vw; height: 100vh; border: none; }
    .status {
      color: #555;
      font-family: sans-serif;
    }
    .status.error { color: #a33; }
  </style>
</head>
<body>
  <div class="status" id="status">Lade Webcams…</div>
  <iframe id="webcamFrame" src="" allow="autoplay; encrypted-media" allowfullscreen style="display:none"></iframe>
  <script>
    const WORKER_URL = "https://paco.team/api/webcams";
    const ROTATION_INTERVAL = 95000;

    function toEmbedUrl(url) {
      const match = url.match(/youtube\.com\/watch\?v=([^&]+)/);
      if (match) return `https://www.youtube.com/embed/${match[1]}?autoplay=1&mute=1`;
      if (url.includes("youtube.com/embed/") && !url.includes("autoplay")) {
        return `${url}${url.includes("?") ? "&" : "?"}autoplay=1&mute=1`;
      }
      return url;
    }

    function shuffle(array) {
      const a = [...array];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    async function startRotation() {
      try {
        const res = await fetch(WORKER_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const all = await res.json();
        const webcams = all.filter((c) => c.rotation);

        if (!webcams.length) {
          document.getElementById("status").textContent = "Keine Webcams aktiv.";
          return;
        }

        document.getElementById("status").remove();
        const frame = document.getElementById("webcamFrame");
        frame.style.display = "block";

        let shuffled = shuffle(webcams);
        let index = 0;

        function next() {
          frame.src = toEmbedUrl(shuffled[index].url);
          index++;
          if (index >= shuffled.length) {
            index = 0;
            shuffled = shuffle(webcams);
          }
        }

        next();
        setInterval(next, ROTATION_INTERVAL);
      } catch (err) {
        const el = document.getElementById("status");
        el.className = "status error";
        el.textContent = `Fehler: ${err.message}`;
      }
    }

    startRotation();
  </script>
</body>
</html>
